version: '3.8'

services:
  directory-organizer:
    image: 192.168.0.247:3002/sparsh/directory-organizer:latest
    container_name: directory-organizer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - VAULTSORT_MODE=both
      - VAULTSORT_INTERVAL=5m
      - VAULTSORT_PORT=8080
      - VAULTSORT_DIRS=/data/watch
      - VAULTSORT_VAULT_PATH=/data/vault
      - VAULTSORT_DB_PATH=/data/vaultsort.db
      # -- AI Configuration (FreeLLM API) --
      - VAULTSORT_BASE_URL=http://192.168.0.247:3001/v1
      - VAULTSORT_MODEL=auto
      - VAULTSORT_API_KEY=freellmapi-5e3541b50ae9df763eace3d9df0d5a58e2a6d2994973ece7
    volumes:
      # Map your host directories here
      - /DATA/AppData/directory-organizer:/data              # For the database and config
