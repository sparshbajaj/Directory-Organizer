version: '3.8'

services:
  directory-organizer:
    image: 192.168.0.247:3002/sparsh/directory-organizer:latest
    container_name: directory-organizer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - VAULTSORT_MODE=both
      - VAULTSORT_INTERVAL=5m
      - VAULTSORT_PORT=8080
      - VAULTSORT_DIRS=/data/watch
      - VAULTSORT_VAULT_PATH=/data/vault
      - VAULTSORT_DB_PATH=/data/vaultsort.db
    volumes:
      # Map your host directories here
      # Left side is your ZimaOS host path, right side is the container path
      - /DATA/AppData/directory-organizer:/data              # For the database and config
      - /DATA/Downloads:/data/watch                          # The directory you want to monitor
      - /DATA/Media/Vault:/data/vault                        # Where you want organized files to go
